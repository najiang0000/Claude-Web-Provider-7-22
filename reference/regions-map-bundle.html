document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"754646af-92b8-43ae-914b-b38d7fed5999\"><\u002Fscript>\n<\u002Fhead>\n<body>\n<x-dc>\n<helmet>\n<style>\n  @keyframes zpulse { 0%{ box-shadow:0 0 0 0 rgba(43,110,220,.35);} 70%{ box-shadow:0 0 0 10px rgba(43,110,220,0);} 100%{ box-shadow:0 0 0 0 rgba(43,110,220,0);} }\n<\u002Fstyle>\n\n<\u002Fhelmet>\n<div style=\"font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; color:#101a2b; background:#ffffff; max-width:1200px; margin:0 auto; padding:36px 40px 48px; -webkit-font-smoothing:antialiased;\">\n\n  <div style=\"display:flex; align-items:flex-end; justify-content:space-between; gap:24px; flex-wrap:wrap; margin-bottom:24px;\">\n    <div>\n      <div style=\"font-size:12px; font-weight:600; letter-spacing:.12em; text-transform:uppercase; color:#7a8aa0; margin-bottom:10px;\">Zilliz Cloud<\u002Fdiv>\n      <h1 style=\"margin:0; font-size:30px; font-weight:700; letter-spacing:-.02em; line-height:1.1;\">Cloud Providers &amp; Regions<\u002Fh1>\n      <p style=\"margin:10px 0 0; font-size:15px; line-height:1.5; color:#5a6b82; max-width:560px;\">Deploy fully-managed vector database clusters across AWS, Google Cloud, and Microsoft Azure. Filter by cloud and cluster type, then explore every supported region.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"display:flex; gap:10px;\">\n      <div style=\"border:1px solid #e4e9f0; border-radius:12px; padding:12px 16px; min-width:78px;\">\n        <div style=\"font-size:26px; font-weight:700; letter-spacing:-.02em; line-height:1;\">{{ statRegions }}<\u002Fdiv>\n        <div style=\"font-size:11px; font-weight:600; letter-spacing:.06em; text-transform:uppercase; color:#7a8aa0; margin-top:6px;\">Regions<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"border:1px solid #e4e9f0; border-radius:12px; padding:12px 16px; min-width:78px;\">\n        <div style=\"font-size:26px; font-weight:700; letter-spacing:-.02em; line-height:1;\">{{ statCities }}<\u002Fdiv>\n        <div style=\"font-size:11px; font-weight:600; letter-spacing:.06em; text-transform:uppercase; color:#7a8aa0; margin-top:6px;\">Locations<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"border:1px solid #e4e9f0; border-radius:12px; padding:12px 16px; min-width:78px;\">\n        <div style=\"font-size:26px; font-weight:700; letter-spacing:-.02em; line-height:1;\">{{ statProviders }}<\u002Fdiv>\n        <div style=\"font-size:11px; font-weight:600; letter-spacing:.06em; text-transform:uppercase; color:#7a8aa0; margin-top:6px;\">Clouds<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"display:flex; align-items:center; gap:20px; flex-wrap:wrap; margin-bottom:18px;\">\n    <div style=\"display:flex; align-items:center; gap:10px;\">\n      <span style=\"font-size:12px; font-weight:600; color:#7a8aa0; letter-spacing:.04em;\">CLOUD<\u002Fspan>\n      <div style=\"display:flex; gap:4px; background:#f2f5f9; border:1px solid #e4e9f0; border-radius:10px; padding:4px;\">\n        <sc-for list=\"{{ provOptions }}\" as=\"o\" hint-placeholder-count=\"4\">\n          <button type=\"button\" onclick=\"{{ o.onClick }}\" style=\"{{ o.style }}\">{{ o.label }}<\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex; align-items:center; gap:10px;\">\n      <span style=\"font-size:12px; font-weight:600; color:#7a8aa0; letter-spacing:.04em;\">CLUSTER TYPE<\u002Fspan>\n      <div style=\"display:flex; gap:4px; background:#f2f5f9; border:1px solid #e4e9f0; border-radius:10px; padding:4px;\">\n        <sc-for list=\"{{ typeOptions }}\" as=\"o\" hint-placeholder-count=\"3\">\n          <button type=\"button\" onclick=\"{{ o.onClick }}\" style=\"{{ o.style }}\">{{ o.label }}<\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"position:relative; border:1px solid #e4e9f0; border-radius:16px; background:linear-gradient(180deg,#fbfcfe,#f6f8fb); overflow:visible;\">\n    <div style=\"position:relative; width:100%; padding-top:41.6%; border-radius:16px 16px 0 0; overflow:visible;\">\n      <img src=\"5049d943-350e-4dbb-8a06-acb5e12461b3\" alt=\"World map\" style=\"position:absolute; inset:0; width:100%; height:100%; object-fit:contain; opacity:.9;\">\n      <sc-for list=\"{{ markers }}\" as=\"m\" hint-placeholder-count=\"10\">\n        <div style=\"position:absolute; left:{{ m.leftPct }}; top:{{ m.topPct }}; transform:translate(-50%,-50%); z-index:{{ m.z }};\" onmouseenter=\"{{ m.onEnter }}\" onmouseleave=\"{{ m.onLeave }}\" onclick=\"{{ m.onClick }}\">\n          <div style=\"display:flex; align-items:center; gap:3px; background:#ffffff; border-radius:999px; padding:5px 7px; cursor:pointer; box-shadow:{{ m.chipShadow }}; transition:transform .12s ease;\" style-hover=\"transform:scale(1.14)\">\n            <sc-for list=\"{{ m.dots }}\" as=\"d\" hint-placeholder-count=\"1\">\n              <span style=\"width:11px; height:11px; border-radius:50%; background:{{ d.color }};\"><\u002Fspan>\n            <\u002Fsc-for>\n            <sc-if value=\"{{ m.showCount }}\" hint-placeholder-val=\"{{ false }}\">\n              <span style=\"font-size:11px; font-weight:700; color:#3a4a60; padding:0 2px 0 1px;\">{{ m.count }}<\u002Fspan>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n          <sc-if value=\"{{ m.tipShow }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"position:absolute; {{ m.tipVert }} left:50%; transform:translateX(-50%); background:#0f1a2b; color:#fff; border-radius:12px; padding:12px 14px; width:max-content; max-width:none; white-space:nowrap; box-shadow:0 12px 30px rgba(16,26,43,.28); z-index:60; pointer-events:none;\">\n              <div style=\"font-size:13px; font-weight:700; margin-bottom:8px;\">{{ m.label }}<\u002Fdiv>\n              <sc-for list=\"{{ m.tip }}\" as=\"t\" hint-placeholder-count=\"1\">\n                <div style=\"display:flex; align-items:center; gap:8px; margin-top:5px;\">\n                  <span style=\"width:8px; height:8px; border-radius:50%; background:{{ t.color }}; flex:none;\"><\u002Fspan>\n                  <span style=\"font-family:ui-monospace,SFMono-Regular,Menlo,monospace; font-size:12px; color:#e7ecf4;\">{{ t.code }}<\u002Fspan>\n                  <sc-if value=\"{{ t.free }}\" hint-placeholder-val=\"{{ false }}\">\n                    <span style=\"font-size:10px; font-weight:700; color:#7fe0b0; letter-spacing:.04em;\">FREE<\u002Fspan>\n                  <\u002Fsc-if>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n\n    <div style=\"display:flex; align-items:center; gap:22px; flex-wrap:wrap; padding:14px 18px; border-top:1px solid #e9edf3; background:rgba(255,255,255,.7); border-radius:0 0 15px 15px;\">\n      <sc-for list=\"{{ legend }}\" as=\"l\" hint-placeholder-count=\"3\">\n        <div style=\"display:flex; align-items:center; gap:8px;\" data-comment-anchor=\"bccaaa30ab-div\">\n          <span style=\"width:12px; height:12px; border-radius:50%; background:{{ l.color }};\"><\u002Fspan>\n          <span style=\"font-size:13px; font-weight:600; color:#3a4a60;\">{{ l.label }}<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n      <div style=\"flex:1;\"><\u002Fdiv>\n      <sc-if value=\"{{ hasSel }}\" hint-placeholder-val=\"{{ false }}\">\n        <button type=\"button\" onclick=\"{{ clearSel }}\" style=\"display:flex; align-items:center; gap:7px; font-size:13px; font-weight:600; color:#3a4a60; background:#eef2f7; border:1px solid #e4e9f0; border-radius:999px; padding:6px 12px 6px 14px; cursor:pointer;\">\n          <span>{{ selCityLabel }}<\u002Fspan>\n          <span style=\"font-size:15px; line-height:1; color:#8290a6;\">×<\u002Fspan>\n        <\u002Fbutton>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"margin-top:26px; border:1px solid #e4e9f0; border-radius:14px; overflow:hidden;\">\n    <div style=\"display:grid; grid-template-columns:0.85fr 1.25fr 1.4fr 1.25fr 0.9fr; gap:0; background:#f6f8fb; border-bottom:1px solid #e4e9f0; padding:12px 18px; font-size:11px; font-weight:700; letter-spacing:.03em; text-transform:uppercase; color:#7a8aa0;\">\n      <div>Cloud<\u002Fdiv><div>Region<\u002Fdiv><div>Location<\u002Fdiv><div>Free &amp; Serverless<\u002Fdiv><div>Dedicated<\u002Fdiv>\n    <\u002Fdiv>\n    <sc-for list=\"{{ rows }}\" as=\"r\" hint-placeholder-count=\"12\">\n      <div onclick=\"{{ r.onClick }}\" style=\"display:grid; grid-template-columns:0.85fr 1.25fr 1.4fr 1.25fr 0.9fr; gap:0; align-items:center; padding:13px 18px; border-bottom:1px solid #eef1f6; cursor:pointer; opacity:{{ r.rowOpacity }}; transition:background .12s ease, opacity .12s ease;\" style-hover=\"background:#f7f9fc\">\n        <div style=\"display:flex; align-items:center; gap:9px;\">\n          <span style=\"width:9px; height:9px; border-radius:50%; background:{{ r.color }}; flex:none;\"><\u002Fspan>\n          <span style=\"font-size:13px; font-weight:600; color:#42526b;\">{{ r.provider }}<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"font-family:ui-monospace,SFMono-Regular,Menlo,monospace; font-size:13px; font-weight:600; color:#101a2b;\">{{ r.code }}<\u002Fdiv>\n        <div style=\"font-size:13px; color:#5a6b82;\">{{ r.location }}<\u002Fdiv>\n        <div>\n          <span style=\"{{ r.freeBadgeStyle }}\">{{ r.freeLabel }}<\u002Fspan>\n        <\u002Fdiv>\n        <div>\n          <span style=\"display:inline-flex; align-items:center; gap:6px; font-size:12.5px; font-weight:600; color:#3a4a60;\"><span style=\"width:6px; height:6px; border-radius:50%; background:#3ac07a;\"><\u002Fspan>Available<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-for>\n    <sc-if value=\"{{ noRows }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"padding:26px 18px; text-align:center; font-size:14px; color:#8290a6;\">No regions match the current filters.<\u002Fdiv>\n    <\u002Fsc-if>\n  <\u002Fdiv>\n\n  <p style=\"margin:16px 2px 0; font-size:12px; color:#94a1b4;\">All regions support Dedicated clusters. Free &amp; Serverless availability varies by region. To request a new region, contact Zilliz Cloud.<\u002Fp>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1200,&quot;height&quot;:900},&quot;accent&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;oklch(0.55 0.17 252)&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Theme&quot;}}\">\nclass Component extends DCLogic {\n  state = { provider: 'all', type: 'all', selectedCity: null, hover: null };\n\n  PMETA = {\n    aws:   { label: 'AWS',          color: '#FF9900' },\n    gcp:   { label: 'Google Cloud', color: '#EA4335' },\n    azure: { label: 'Azure',        color: '#0078D4' },\n  };\n\n  CITIES = {\n    Oregon:    { x: 13.3, y: 21.7, label: 'Oregon, USA' },\n    Iowa:      { x: 21.4, y: 23.8, label: 'Iowa, USA' },\n    Ohio:      { x: 24.4, y: 24.8, label: 'Ohio, USA' },\n    Virginia:  { x: 25.9, y: 25.4, label: 'N. Virginia, USA' },\n    Montreal:  { x: 27.0, y: 21.8, label: 'Canada Central' },\n    Ireland:   { x: 45.8, y: 17.6, label: 'Ireland' },\n    Frankfurt: { x: 50.0, y: 19.4, label: 'Frankfurt, Germany' },\n    Pune:      { x: 68.2, y: 36.4, label: 'Pune, India' },\n    Singapore: { x: 76.5, y: 45.6, label: 'Singapore' },\n    Seoul:     { x: 83.0, y: 26.2, label: 'Seoul, Korea' },\n    Tokyo:     { x: 86.6, y: 27.1, label: 'Tokyo, Japan' },\n    Sydney:    { x: 89.8, y: 64.7, label: 'Sydney, Australia' },\n  };\n\n  REGIONS = [\n    { p:'aws', code:'us-west-2',      city:'Oregon',    cont:'North America', free:false },\n    { p:'aws', code:'us-east-1',      city:'Virginia',  cont:'North America', free:false },\n    { p:'aws', code:'us-east-2',      city:'Ohio',      cont:'North America', free:false },\n    { p:'aws', code:'ca-central-1',   city:'Montreal',  cont:'North America', free:false },\n    { p:'aws', code:'eu-central-1',   city:'Frankfurt', cont:'Europe',        free:true  },\n    { p:'aws', code:'eu-west-1',      city:'Ireland',   cont:'Europe',        free:true  },\n    { p:'aws', code:'ap-northeast-1', city:'Tokyo',     cont:'Asia',          free:false },\n    { p:'aws', code:'ap-northeast-2', city:'Seoul',     cont:'Asia',          free:false },\n    { p:'aws', code:'ap-southeast-1', city:'Singapore', cont:'Asia',          free:false },\n    { p:'aws', code:'ap-southeast-2', city:'Sydney',    cont:'Oceania',       free:false },\n    { p:'gcp', code:'us-west1',       city:'Oregon',    cont:'North America', free:true  },\n    { p:'gcp', code:'us-east4',       city:'Virginia',  cont:'North America', free:false },\n    { p:'gcp', code:'us-central1',    city:'Iowa',      cont:'North America', free:false },\n    { p:'gcp', code:'europe-west3',   city:'Frankfurt', cont:'Europe',        free:false },\n    { p:'gcp', code:'asia-southeast1',city:'Singapore', cont:'Asia',          free:false },\n    { p:'azure', code:'East US',              city:'Virginia',  cont:'North America', free:false },\n    { p:'azure', code:'East US 2',            city:'Virginia',  cont:'North America', free:false },\n    { p:'azure', code:'Central US',           city:'Iowa',      cont:'North America', free:false },\n    { p:'azure', code:'Germany West Central', city:'Frankfurt', cont:'Europe',        free:false },\n    { p:'azure', code:'North Europe',         city:'Ireland',   cont:'Europe',        free:false },\n    { p:'azure', code:'Central India',        city:'Pune',      cont:'Asia',          free:false },\n  ];\n\n  segStyle(active, accent) {\n    const base = 'font-size:13px; font-weight:600; padding:6px 13px; border:none; border-radius:7px; cursor:pointer; transition:all .12s ease; white-space:nowrap;';\n    return active\n      ? base + `background:${accent}; color:#fff; box-shadow:0 1px 3px rgba(16,26,43,.2);`\n      : base + 'background:transparent; color:#5a6b82;';\n  }\n\n  renderVals() {\n    const P = this.PMETA;\n    const accent = this.props.accent ?? 'oklch(0.55 0.17 252)';\n    const provFilter = this.state.provider;\n    const typeFilter = this.state.type;\n    const sel = this.state.selectedCity;\n    const order = ['aws', 'gcp', 'azure'];\n\n    const match = (r) =>\n      (provFilter === 'all' || r.p === provFilter) &&\n      (typeFilter === 'all' || (typeFilter === 'free' ? r.free : true));\n    const filtered = this.REGIONS.filter(match);\n\n    const cityKeys = Object.keys(this.CITIES);\n    const markers = cityKeys.map((ck) => {\n      const c = this.CITIES[ck];\n      const regs = filtered.filter((r) => r.city === ck);\n      if (!regs.length) return null;\n      const provs = order.filter((p) => regs.some((r) => r.p === p));\n      const selected = sel === ck;\n      return {\n        city: ck,\n        label: c.label,\n        leftPct: c.x + '%',\n        topPct: c.y + '%',\n        z: selected ? 40 : (this.state.hover === ck ? 50 : 10),\n        dots: provs.map((p) => ({ color: P[p].color })),\n        count: regs.length,\n        showCount: regs.length > 1,\n        selected,\n        chipShadow: selected\n          ? `0 0 0 3px ${accent}, 0 6px 16px rgba(16,26,43,.20)`\n          : '0 3px 10px rgba(16,26,43,.16)',\n        tip: regs.slice().sort((a,b)=>order.indexOf(a.p)-order.indexOf(b.p)).map((r) => ({ code: r.code, color: P[r.p].color, free: r.free })),\n        tipShow: this.state.hover === ck,\n        tipVert: c.y < 34 ? 'top:calc(100% + 12px);' : 'bottom:calc(100% + 12px);',\n        onEnter: () => this.setState({ hover: ck }),\n        onLeave: () => this.setState({ hover: null }),\n        onClick: () => this.setState((s) => ({ selectedCity: s.selectedCity === ck ? null : ck })),\n      };\n    }).filter(Boolean);\n\n    const rows = filtered.slice().sort((a, b) =>\n      order.indexOf(a.p) - order.indexOf(b.p) ||\n      a.cont.localeCompare(b.cont) ||\n      a.code.localeCompare(b.code)\n    ).map((r) => {\n      const dim = sel && r.city !== sel;\n      const freeBadgeStyle = r.free\n        ? `display:inline-flex; align-items:center; gap:6px; font-size:12.5px; font-weight:600; color:${accent};`\n        : 'display:inline-flex; align-items:center; font-size:12.5px; font-weight:600; color:#aab4c2;';\n      return {\n        code: r.code,\n        provider: P[r.p].label,\n        color: P[r.p].color,\n        location: this.CITIES[r.city].label,\n        free: r.free,\n        freeLabel: r.free ? '● Available' : '— Not available',\n        freeBadgeStyle,\n        rowOpacity: dim ? '0.38' : '1',\n        onClick: () => this.setState({ selectedCity: r.city, hover: null }),\n      };\n    });\n\n    const provOptions = [\n      { key: 'all', label: 'All' },\n      { key: 'aws', label: 'AWS' },\n      { key: 'gcp', label: 'Google Cloud' },\n      { key: 'azure', label: 'Azure' },\n    ].map((o) => ({\n      label: o.label,\n      active: provFilter === o.key,\n      style: this.segStyle(provFilter === o.key, accent),\n      onClick: () => this.setState({ provider: o.key, selectedCity: null }),\n    }));\n\n    const typeOptions = [\n      { key: 'all', label: 'All' },\n      { key: 'free', label: 'Free & Serverless' },\n      { key: 'dedicated', label: 'Dedicated' },\n    ].map((o) => ({\n      label: o.label,\n      active: typeFilter === o.key,\n      style: this.segStyle(typeFilter === o.key, accent),\n      onClick: () => this.setState({ type: o.key, selectedCity: null }),\n    }));\n\n    const legend = order.map((p) => ({ label: P[p].label, color: P[p].color }));\n    const cities = new Set(filtered.map((r) => r.city));\n\n    return {\n      markers, rows, provOptions, typeOptions, legend,\n      statRegions: filtered.length,\n      statCities: cities.size,\n      statProviders: new Set(filtered.map((r) => r.p)).size,\n      noRows: filtered.length === 0,\n      hasSel: !!sel,\n      selCityLabel: sel ? this.CITIES[sel].label : '',\n      clearSel: () => this.setState({ selectedCity: null }),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
