<style>
  @font-face {
    font-family: "Geist";

    font-style: normal;
    font-weight: 100 900;
    font-display: swap;
  }
  :root{
    --page:#101011; --surface:#171719; --text:#f5f3ee; --muted:#aaa7b0;
    --line:#303036; --line-strong:#474750;
    --aws:#ff9900; --gcp:#f44336; --azure:#0078d4;
    color-scheme: dark;
  }
  *{ box-sizing:border-box; }
  body{
    margin:0; padding:48px 24px; background:var(--page); color:var(--text);
    font-family: Geist, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
  }
  .map-wrap{ width:min(1200px, 100%); margin-inline:auto; }
  .map-card{
    position:relative; overflow:hidden;
    border:1px solid var(--line); border-radius:16px;
    background: linear-gradient(180deg, #16161a 0%, #101013 100%);
  }
  .region-map{ width:100%; height:auto; display:block; min-height:480px; }
  .region-map .country{ fill:#1d1d21; stroke:#38383f; stroke-width:.6; }

  .marker{ cursor:pointer; }
  .marker-core{
    stroke:rgba(9,9,10,.9); stroke-width:1.4;
    transition: r 140ms ease, stroke 140ms ease, opacity 140ms ease;
  }
  .marker-ring{
    fill:none; stroke:#fff; stroke-width:1.3; opacity:0;
    transition: opacity 140ms ease, r 140ms ease;
  }
  .marker:hover .marker-ring, .marker:focus-visible .marker-ring{ opacity:.85; }
  .marker:hover .marker-core, .marker:focus-visible .marker-core{ stroke:#fff; }
  .marker:focus-visible{ outline:none; }
  .marker-badge-bg{ fill:#0c0c0d; stroke:rgba(255,255,255,.28); stroke-width:1; }
  .marker-badge-text{
    fill:var(--text); font-family:Geist,sans-serif; font-size:9.5px; font-weight:600;
    text-anchor:middle; dominant-baseline:central;
  }
  .marker-hit{ fill:transparent; }

  .map-legend{
    display:flex; flex-wrap:wrap; align-items:center; gap:20px;
    margin:16px 4px 0; color:var(--muted); font-size:13px;
  }
  .legend-item{ display:inline-flex; align-items:center; gap:8px; }
  .legend-dot{
    width:12px; height:12px; flex:0 0 12px; border-radius:50%;
    background: var(--provider-color);
  }

  @media (max-width:640px){
    body{ padding:28px 16px; }
    .region-map{ min-height:320px; }
  }
</style>

<script>
(function(){
  var PROVIDERS = {aws:{color:'#ff9900'}, gcp:{color:'#f44336'}, azure:{color:'#0078d4'}};

  function groupByLocation(regions){
    var map = {};
    regions.forEach(function(r){
      if(!map[r.loc]) map[r.loc] = {loc:r.loc, x:r.x, y:r.y, regions:[]};
      map[r.loc].regions.push(r);
    });
    return Object.keys(map).map(function(k){ return map[k]; });
  }

  var LOCATIONS = groupByLocation(REGIONS);
  var g = document.querySelector('[data-markers]');

  LOCATIONS.forEach(function(loc){
    var providers = Array.from(new Set(loc.regions.map(function(r){ return r.p; })));
    var mg = document.createElementNS('http://www.w3.org/2000/svg','g');
    mg.setAttribute('class','marker');
    mg.setAttribute('tabindex','0');
    mg.setAttribute('role','img');
    mg.setAttribute('aria-label', loc.loc + ', ' + loc.regions.length + ' region' + (loc.regions.length>1?'s':''));

    var ring = document.createElementNS('http://www.w3.org/2000/svg','circle');
    ring.setAttribute('class','marker-ring');
    ring.setAttribute('cx', loc.x); ring.setAttribute('cy', loc.y); ring.setAttribute('r', 11);
    mg.appendChild(ring);

    var n = providers.length;
    providers.forEach(function(p, i){
      var angle = (n===1) ? 0 : (i/n) * Math.PI*2 - Math.PI/2;
      var rad = n===1 ? 0 : 4.6;
      var cx = loc.x + Math.cos(angle)*rad;
      var cy = loc.y + Math.sin(angle)*rad;
      var dot = document.createElementNS('http://www.w3.org/2000/svg','circle');
      dot.setAttribute('class','marker-core');
      dot.setAttribute('cx', cx); dot.setAttribute('cy', cy);
      dot.setAttribute('r', n===1 ? 6.5 : 5);
      dot.setAttribute('fill', PROVIDERS[p].color);
      mg.appendChild(dot);
    });

    if(loc.regions.length > 1){
      var bg = document.createElementNS('http://www.w3.org/2000/svg','circle');
      bg.setAttribute('class','marker-badge-bg');
      bg.setAttribute('cx', loc.x+9); bg.setAttribute('cy', loc.y-9); bg.setAttribute('r',7.5);
      mg.appendChild(bg);
      var txt = document.createElementNS('http://www.w3.org/2000/svg','text');
      txt.setAttribute('class','marker-badge-text');
      txt.setAttribute('x', loc.x+9); txt.setAttribute('y', loc.y-8.5);
      txt.textContent = loc.regions.length;
      mg.appendChild(txt);
    }

    var hit = document.createElementNS('http://www.w3.org/2000/svg','circle');
    hit.setAttribute('class','marker-hit');
    hit.setAttribute('cx', loc.x); hit.setAttribute('cy', loc.y); hit.setAttribute('r', 14);
    mg.appendChild(hit);

    g.appendChild(mg);
  });
})();
